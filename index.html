<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Brener - Modelo Torcedor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 15px; 
        }

        /* Container Principal */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Estilo para Computador: 3 colunas */
        @media (min-width: 768px) {
            .product-grid {
                display: flex;
                justify-content: center;
                gap: 20px;
            }
            .card { flex: 1; max-width: 360px; }
        }

        /* Estilo para Celular: Carrossel de Cards */
        @media (max-width: 767px) {
            .product-grid { display: block; }
            .card { width: 85vw; margin-bottom: 0; }
        }

        .card { 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            overflow: hidden;
            height: 100%;
        }

        /* Imagens das Camisas */
        .swiper-images { width: 100%; height: 280px; background-color: #eee; }
        .swiper-images img { width: 100%; height: 100%; object-fit: cover; }
        
        .content { padding: 15px; text-align: center; }
        h2 { margin: 0 0 5px; color: #333; font-size: 1.1rem; }
        .modelo-info { color: #888; font-size: 0.85rem; margin-bottom: 10px; }
        
        .price-area { margin-bottom: 15px; }
        .old-price { color: #999; text-decoration: line-through; font-size: 0.9rem; margin-right: 5px; }
        .new-price { color: #27ae60; font-weight: bold; font-size: 1.2rem; }
        
        .btn-whatsapp { 
            display: block; 
            background-color: #25d366; 
            color: white; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 0.9rem;
        }

        .swiper-pagination-bullet-active { background: #25d366; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="swiper swiper-produtos">
            <div class="swiper-wrapper product-grid">
                
                <div class="swiper-slide card">
                    <div class="swiper swiper-images">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide"><img src="foto1.png" alt="Camisa A1"></div>
                            <div class="swiper-slide"><img src="foto2.png" alt="Camisa A2"></div>
                            <div class="swiper-slide"><img src="foto3.png" alt="Camisa A3"></div>
                        </div>
                        <div class="swiper-pagination"></div>
                    </div>
                    <div class="content">
                        <h2>Camisa Opção A</h2>
                        <p class="modelo-info">Modelo Torcedor</p>
                        <div class="price-area">
                            <span class="old-price">R$ 189,00</span>
                            <span class="new-price">R$ 169,00</span>
                        </div>
                        <a href="https://wa.me/5591993249580?text=Olá Brener, quero a Opção A." class="btn-whatsapp">Entre em contato</a>
                    </div>
                </div>

                <div class="swiper-slide card">
                    <div class="swiper swiper-images">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide"><img src="photo1.png" alt="Camisa B1"></div>
                            <div class="swiper-slide"><img src="photo2.png" alt="Camisa B2"></div>
                            <div class="swiper-slide"><img src="photo3.png" alt="Camisa B3"></div>
                        </div>
                        <div class="swiper-pagination"></div>
                    </div>
                    <div class="content">
                        <h2>Camisa Opção B</h2>
                        <p class="modelo-info">Modelo Torcedor</p>
                        <div class="price-area">
                            <span class="old-price">R$ 189,00</span>
                            <span class="new-price">R$ 169,00</span>
                        </div>
                        <a href="https://wa.me/5591993249580?text=Olá Brener, quero a Opção B." class="btn-whatsapp">Entre em contato</a>
                    </div>
                </div>

                <div class="swiper-slide card">
                    <div class="swiper swiper-images">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide"><img src="picture1.png" alt="Camisa C1"></div>
                            <div class="swiper-slide"><img src="picture2.png" alt="Camisa C2"></div>
                            <div class="swiper-slide"><img src="picture3.png" alt="Camisa C3"></div>
                        </div>
                        <div class="swiper-pagination"></div>
                    </div>
                    <div class="content">
                        <h2>Camisa Opção C</h2>
                        <p class="modelo-info">Modelo Torcedor</p>
                        <div class="price-area">
                            <span class="old-price">R$ 189,00</span>
                            <span class="new-price">R$ 169,00</span>
                        </div>
                        <a href="https://wa.me/5591993249580?text=Olá Brener, quero a Opção C." class="btn-whatsapp">Entre em contato</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Configuração para as imagens internas de cada card
        const configImagens = { loop: true, pagination: { el: '.swiper-pagination', clickable: true } };
        new Swiper('.swiper-images', configImagens);

        // Configuração do Carrossel de PRODUTOS (Ativa conforme o tamanho da tela)
        const swiperProdutos = new Swiper('.swiper-produtos', {
            slidesPerView: 'auto',
            spaceBetween: 20,
            breakpoints: {
                768: {
                    enabled: false, // Desativa carrossel no PC (vira grid)
                }
            }
        });
    </script>
</body>
</html>
