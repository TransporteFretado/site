<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club da Bola - Vitrine Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #7b00ff; /* Roxo Netshoes para destaque */
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666;
            --border-color: #eee;
        }

        body { font-family: 'Roboto', sans-serif; background-color: #fff; margin: 0; color: var(--text-main); }
        
        /* HEADER ESTILO APP */
        header { 
            position: sticky; top: 0; z-index: 1000;
            background: white; padding: 10px 15px; 
            border-bottom: 1px solid var(--border-color);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .brand h1 { margin: 0; font-size: 1.4rem; letter-spacing: -1px; text-transform: lowercase; font-weight: 700; }
        
        .search-container { position: relative; width: 100%; }
        #searchInput { 
            width: 100%; padding: 12px 40px 12px 15px; 
            border-radius: 8px; border: 1px solid #ddd; 
            background: #f5f5f5; box-sizing: border-box; outline: none;
        }

        /* FILTROS */
        .filter-bar {
            padding: 10px 15px; display: flex; gap: 10px; 
            overflow-x: auto; white-space: nowrap; border-bottom: 1px solid var(--border-color);
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd;
            background: white; font-size: 0.85rem; cursor: pointer;
        }
        .filter-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }

        /* SEÇÕES DE CATEGORIA */
        .category-section { padding: 20px 0; border-bottom: 8px solid #f9f9f9; }
        .category-title { 
            padding: 0 15px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .category-title h2 { font-size: 1.1rem; margin: 0; font-weight: 700; }
        .view-all { font-size: 0.85rem; color: var(--text-muted); text-decoration: underline; }

        /* CARROSSEL DE PRODUTOS */
        .swiper-products { padding: 0 15px !important; }
        
        .product-card { 
            width: 160px; /* Tamanho mobile padrão */
            transition: 0.3s; position: relative;
        }
        .img-wrapper {
            background: #f8f8f8; border-radius: 4px; overflow: hidden;
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            cursor: zoom-in;
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: contain; }
        
        .product-info { padding: 10px 0; }
        .product-name { font-size: 0.85rem; margin: 0; color: #333; height: 34px; overflow: hidden; }
        .product-price { display: block; font-weight: 700; font-size: 1rem; margin-top: 5px; color: #000; }
        .product-old-price { font-size: 0.75rem; color: #999; text-decoration: line-through; }

        /* RESPONSIVIDADE DESKTOP */
        @media (min-width: 768px) {
            .product-card { width: 220px; }
            .category-section { max-width: 1200px; margin: 0 auto; }
            #searchInput { max-width: 500px; }
            .header-top { justify-content: center; gap: 50px; }
        }

        footer { padding: 40px 15px; text-align: center; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="brand"><h1>club<span>da</span>bola</h1></div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="O que você está procurando?" onkeyup="searchProducts()">
        </div>
    </header>

    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="filterTab('todos', this)">Tudo</button>
        <button class="filter-btn" onclick="filterTab('brasileirao', this)">Brasileirão</button>
        <button class="filter-btn" onclick="filterTab('laliga', this)">La Liga</button>
        <button class="filter-btn" onclick="filterTab('selecoes', this)">Seleções</button>
    </div>

    <main id="mainContent">
        <section class="category-section" data-cat="brasileirao">
            <div class="category-title">
                <h2>Brasileirão 2026</h2>
                <a href="#" class="view-all">Ver mais</a>
            </div>
            <div class="swiper swiper-products">
                <div class="swiper-wrapper">
                    <div class="swiper-slide product-card">
                        <div class="img-wrapper">
                            <a href="Vasco/foto1.png" data-fancybox="gallery-vasco">
                                <img src="Vasco/foto1.png" alt="Vasco">
                            </a>
                        </div>
                        <div class="product-info">
                            <p class="product-name">Camisa Vasco 2026 Tailandesa</p>
                            <span class="product-old-price">R$ 189,00</span>
                            <span class="product-price">R$ 169,00</span>
                        </div>
                    </div>
                    <div class="swiper-slide product-card">
                        <div class="img-wrapper">
                            <a href="Flamengo/foto1.png" data-fancybox="gallery-fla">
                                <img src="Flamengo/foto1.png" alt="Flamengo">
                            </a>
                        </div>
                        <div class="product-info">
                            <p class="product-name">Camisa Flamengo 2026 Tailandesa</p>
                            <span class="product-price">R$ 169,00</span>
                        </div>
                    </div>
                    </div>
            </div>
        </section>

        <section class="category-section" data-cat="laliga">
            <div class="category-title">
                <h2>La Liga</h2>
                <a href="#" class="view-all">Ver mais</a>
            </div>
            <div class="swiper swiper-products">
                <div class="swiper-wrapper">
                    <div class="swiper-slide product-card">
                        <div class="img-wrapper">
                            <a href="Real Madrid/foto1.png" data-fancybox="gallery-real">
                                <img src="Real Madrid/foto1.png" alt="Real">
                            </a>
                        </div>
                        <div class="product-info">
                            <p class="product-name">Camisa Real Madrid 2026 Jogador</p>
                            <span class="product-price">R$ 189,00</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Club da Bola. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    
    <script>
        // Inicializa Carrosséis Horizontais
        const initSwipers = () => {
            new Swiper('.swiper-products', {
                slidesPerView: 'auto',
                spaceBetween: 15,
                freeMode: true,
                mousewheel: { forceToAxis: true },
            });
        }

        // Configuração do Zoom (Fancybox)
        Fancybox.bind("[data-fancybox]", {
            Images: { Panzoom: { maxScale: 3 } }, // Permite muito zoom
            Toolbar: { display: { left: ["infobar"], right: ["iterateZoom", "close"] } }
        });

        // Filtro por Abas
        function filterTab(category, btn) {
            // Estilo do botão
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Lógica de exibição
            document.querySelectorAll('.category-section').forEach(section => {
                if(category === 'todos' || section.getAttribute('data-cat') === category) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        }

        // Busca simples
        function searchProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('.product-card');
            
            cards.forEach(card => {
                let name = card.querySelector('.product-name').innerText.toLowerCase();
                card.style.opacity = name.includes(input) ? "1" : "0.2";
            });
        }

        window.onload = initSwipers;
    </script>
</body>
</html>
