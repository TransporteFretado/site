<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda - Transporte Fretado</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Estilo do Carrossel de Fotos */
        .swiper {
            width: 100%;
            height: 300px;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        h2 { margin: 0; color: #333; }
        
        .price {
            font-size: 1.6rem;
            color: #27ae60;
            font-weight: bold;
            margin: 10px 0;
        }

        .description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-contact {
            display: block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-contact:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="Foto 1.png" alt="Minha Foto 1">
                </div>

                </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="content">
            <h2>Transporte Fretado</h2>
            <div class="price">Consulte Valor</div>
            <p class="description">
                Serviço de transporte fretado com segurança e conforto. 
                Entre em contato para orçamentos e disponibilidades.
            </p>
            
            <a href="https://wa.me/5500000000000" class="btn-contact">
                Entre em Contato
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true,
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>

</body>
</html>
