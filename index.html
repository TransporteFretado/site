<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine do Brener</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
        }

        /* Container que organiza os cards lado a lado no PC */
        .container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card { 
            background: white; 
            flex: 1;
            min-width: 300px; 
            max-width: 360px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            overflow: hidden; 
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        /* Tamanho das imagens do carrossel */
        .swiper { width: 100%; height: 260px; background-color: #ddd; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .content { padding: 20px; text-align: center; }
        h2 { margin: 0 0 10px; color: #333; font-size: 1.3rem; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        
        /* Botão Personalizado */
        .btn-whatsapp { 
            display: block; 
            background-color: #25d366; 
            color: white; 
            padding: 14px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1rem;
            transition: background 0.3s; 
        }
        .btn-whatsapp:hover { background-color: #128c7e; }

        /* Bolinhas do carrossel */
        .swiper-pagination-bullet-active { background: #25d366; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card">
            <div class="swiper swiper-a">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="foto1.png" alt="Veículo A1"></div>
                    <div class="swiper-slide"><img src="foto2.png" alt="Veículo A2"></div>
                    <div class="swiper-slide"><img src="foto3.png" alt="Veículo A3"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="content">
                <h2>Transporte Modelo A</h2>
                <p class="price">Orçamento sob consulta</p>
                <a href="https://wa.me/5591993249580?text=Olá Brener, gostaria de saber mais sobre a Opção A." class="btn-whatsapp">
                    Entre em contato com o Brener
                </a>
            </div>
        </div>

        <div class="card">
            <div class="swiper swiper-b">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="photo1.png" alt="Veículo B1"></div>
                    <div class="swiper-slide"><img src="photo2.png" alt="Veículo B2"></div>
                    <div class="swiper-slide"><img src="photo3.png" alt="Veículo B3"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="content">
                <h2>Transporte Modelo B</h2>
                <p class="price">Orçamento sob consulta</p>
                <a href="https://wa.me/5591993249580?text=Olá Brener, gostaria de saber mais sobre a Opção B." class="btn-whatsapp">
                    Entre em contato com o Brener
                </a>
            </div>
        </div>

        <div class="card">
            <div class="swiper swiper-c">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="picture1.png" alt="Veículo C1"></div>
                    <div class="swiper-slide"><img src="picture2.png" alt="Veículo C2"></div>
                    <div class="swiper-slide"><img src="picture3.png" alt="Veículo C3"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="content">
                <h2>Transporte Modelo C</h2>
                <p class="price">Orçamento sob consulta</p>
                <a href="https://wa.me/5591993249580?text=Olá Brener, gostaria de saber mais sobre a Opção C." class="btn-whatsapp">
                    Entre em contato com o Brener
                </a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const config = { loop: true, pagination: { el: '.swiper-pagination', clickable: true } };
        new Swiper('.swiper-a', config);
        new Swiper('.swiper-b', config);
        new Swiper('.swiper-c', config);
    </script>
</body>
</html>
