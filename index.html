<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Produto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: #666;
        }

        .content {
            padding: 20px;
        }

        h2 {
            margin: 10px 0;
            color: #333;
        }

        .price {
            font-size: 1.5rem;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .description {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn-contact {
            display: inline-block;
            background-color: #25d366; /* Cor do WhatsApp */
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-contact:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="product-image">
            <img src="https://via.placeholder.com/350x250" alt="Produto" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <div class="content">
            <h2>Nome do Produto</h2>
            <div class="price">R$ 299,90</div>
            <p class="description">
                Uma breve descrição das qualidades incríveis deste item. Ideal para quem busca qualidade e exclusividade.
            </p>
            
            <a href="https://wa.me/5500000000000?text=Olá! Tenho interesse no produto." class="btn-contact">
                Entre em Contato
            </a>
        </div>
    </div>

</body>
</html>
