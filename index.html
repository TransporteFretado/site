<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club da Bola - Vitrine Oficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #25d366; --bg-gray: #f4f4f4; }
        body { font-family: 'Roboto', sans-serif; background-color: #fff; margin: 0; padding: 0; }
        
        header { 
            background: #fff; padding: 20px 15px; 
            display: flex; flex-direction: column; align-items: center; 
            gap: 12px; border-bottom: 1px solid #eee;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand img { height: 35px; width: auto; }
        .brand h1 { margin: 0; font-family: 'Oswald', sans-serif; font-size: 1.5rem; text-transform: uppercase; }

        .search-wrapper { width: 100%; max-width: 350px; }
        #searchInput { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid #ddd; background: #fff; outline: none; box-sizing: border-box;
        }

        /* Filtros Lado a Lado */
        .filter-container { 
            display: flex; gap: 10px; width: 100%; max-width: 350px; 
        }
        .filter-wrapper { flex: 1; }
        #categorySelect, #modelSelect { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid #ddd; background: #fff; outline: none; cursor: pointer;
        }

        .category-section { padding: 20px 0; border-bottom: 6px solid var(--bg-gray); }
        .category-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px 10px; }
        .category-header h2 { font-size: 1rem; margin: 0; text-transform: uppercase; }
        .view-more { font-size: 0.75rem; color: #888; text-decoration: none; }

        .swiper-main { padding: 0 15px !important; }
        .product-card { width: 170px; display: flex; flex-direction: column; }
        .product-card.hidden { display: none !important; }

        .img-container { 
            width: 100%; aspect-ratio: 1/1; background: #f9f9f9; 
            border-radius: 8px; overflow: hidden; position: relative;
        }
        .swiper-pics { width: 100%; height: 100%; }
        .swiper-pics img { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; }

        .card-info { padding: 10px 0; }
        .card-info h3 { font-size: 0.8rem; margin: 0; height: 32px; overflow: hidden; color: #333; }
        .model-text { font-size: 0.7rem; color: #999; margin: 3px 0; }
        
        .price-box { margin-bottom: 8px; }
        .price-old { font-size: 0.75rem; color: #bbb; text-decoration: line-through; display: block; }
        .price-now { font-size: 0.95rem; font-weight: bold; color: #000; }

        .btn-contact { 
            display: block; background: var(--primary-green); color: #fff; 
            text-align: center; padding: 7px; border-radius: 4px; 
            text-decoration: none; font-size: 0.7rem; font-weight: bold; 
        }

        @media (min-width: 768px) { .product-card { width: 210px; } }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="logo1.png" alt="Logo">
            <h1>Club da Bola</h1>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Qual time você procura?" onkeyup="searchAndFilter()">
        </div>
        <div class="filter-container">
            <div class="filter-wrapper">
                <select id="categorySelect" onchange="searchAndFilter()">
                    <option value="todos">Categorias</option>
                    <option value="brasileirao">Brasileirão</option>
                    <option value="laliga">La Liga</option>
                    <option value="premier">Premier League</option>
                    <option value="selecoes">Seleções</option>
                </select>
            </div>
            <div class="filter-wrapper">
                <select id="modelSelect" onchange="searchAndFilter()">
                    <option value="todos">Modelos</option>
                    <option value="Torcedor">Torcedor</option>
                    <option value="Jogador">Jogador</option>
                </select>
            </div>
        </div>
    </header>

    <main id="catalog">
        <section class="category-section" data-cat="brasileirao">
            <div class="category-header"><h2>Brasileirão</h2><a href="#" class="view-more">Ver tudo ></a></div>
            <div class="swiper swiper-main"><div class="swiper-wrapper" id="grid-brasileirao"></div></div>
        </section>
        <section class="category-section" data-cat="laliga">
            <div class="category-header"><h2>La Liga</h2><a href="#" class="view-more">Ver tudo ></a></div>
            <div class="swiper swiper-main"><div class="swiper-wrapper" id="grid-laliga"></div></div>
        </section>
        <section class="category-section" data-cat="premier">
            <div class="category-header"><h2>Premier League</h2><a href="#" class="view-more">Ver tudo ></a></div>
            <div class="swiper swiper-main"><div class="swiper-wrapper" id="grid-premier"></div></div>
        </section>
        <section class="category-section" data-cat="selecoes">
            <div class="category-header"><h2>Seleções</h2><a href="#" class="view-more">Ver tudo ></a></div>
            <div class="swiper swiper-main"><div class="swiper-wrapper" id="grid-selecoes"></div></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        const produtos = [
            {id: 'vasco', nome: 'Vasco', cat: 'brasileirao', mod: 'Torcedor', pasta: 'Vasco'},
            {id: 'flamengo', nome: 'Flamengo', cat: 'brasileirao', mod: 'Torcedor', pasta: 'Flamengo'},
            {id: 'flamengo_jog', nome: 'Flamengo', cat: 'brasileirao', mod: 'Jogador', pasta: 'Flamengo Jogador'},
            {id: 'palmeiras', nome: 'Palmeiras', cat: 'brasileirao', mod: 'Torcedor', pasta: 'Palmeiras'},
            {id: 'palmeiras_jog', nome: 'Palmeiras', cat: 'brasileirao', mod: 'Jogador', pasta: 'Palmeiras Jogador'},
            {id: 'corinthians', nome: 'Corinthians', cat: 'brasileirao', mod: 'Torcedor', pasta: 'Corinthians'},
            {id: 'saopaulo', nome: 'São Paulo', cat: 'brasileirao', mod: 'Torcedor', pasta: 'Sao Paulo'},
            {id: 'realmadrid', nome: 'Real Madrid', cat: 'laliga', mod: 'Jogador', pasta: 'Real Madrid Jogador'},
            {id: 'barcelona', nome: 'Barcelona', cat: 'laliga', mod: 'Jogador', pasta: 'Barcelona Jogador'},
            {id: 'mancity', nome: 'Manchester City', cat: 'premier', mod: 'Torcedor', pasta: 'Manchester City'},
            {id: 'brasil', nome: 'Brasil', cat: 'selecoes', mod: 'Torcedor', pasta: 'Selecoes', f1: 'brasil1.png', f2: 'brasil2.png'},
            {id: 'argentina', nome: 'Argentina', cat: 'selecoes', mod: 'Torcedor', pasta: 'Selecoes', f1: 'argentina1.png', f2: 'argentina2.png'},
            {id: 'portugal', nome: 'Portugal', cat: 'selecoes', mod: 'Torcedor', pasta: 'Selecoes', f1: 'portugal1.png', f2: 'portugal2.png'}
        ];

        function render() {
            produtos.forEach(p => {
                const f1 = p.f1 ? `${p.pasta}/${p.f1}` : `${p.pasta}/foto1.png`;
                const f2 = p.f2 ? `${p.pasta}/${p.f2}` : `${p.pasta}/foto2.png`;
                
                // Lógica de Preços
                let pDe = (p.mod === 'Jogador' || p.cat === 'selecoes') ? '209,00' : '189,00';
                let pPor = (p.mod === 'Jogador' || p.cat === 'selecoes') ? '189,00' : '169,00';
                
                // Mensagem WhatsApp
                const msg = encodeURIComponent(`Olá, quero ver mais detalhes da camisa do ${p.nome} (${p.mod}) Tailandesa.\nLink da imagem: ${window.location.origin}/${f1}`);
                const wppLink = `https://wa.me/5591993249580?text=${msg}`;

                const html = `
                <div class="swiper-slide product-card" data-name="${p.nome.toLowerCase()}" data-cat="${p.cat}" data-mod="${p.mod}">
                    <div class="img-container">
                        <div class="swiper swiper-pics">
                            <div class="swiper-wrapper">
                                <div class="swiper-slide"><a href="${f1}" data-fancybox="${p.id}"><img src="${f1}"></a></div>
                                <div class="swiper-slide"><a href="${f2}" data-fancybox="${p.id}"><img src="${f2}"></a></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3>Camisa ${p.nome} 2026</h3>
                        <p class="model-text">Modelo ${p.mod} Tailandesa</p>
                        <div class="price-box">
                            <span class="price-old">R$ ${pDe}</span>
                            <span class="price-now">R$ ${pPor}</span>
                        </div>
                        <a href="${wppLink}" class="btn-contact">Entre em contato</a>
                    </div>
                </div>`;
                document.getElementById(`grid-${p.cat}`).insertAdjacentHTML('beforeend', html);
            });
        }

        render();

        new Swiper('.swiper-main', { slidesPerView: 'auto', spaceBetween: 15, freeMode: true });
        new Swiper('.swiper-pics', { loop: true });
        Fancybox.bind("[data-fancybox]", { Images: { Panzoom: { maxScale: 3 } } });

        function searchAndFilter() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const selCat = document.getElementById('categorySelect').value;
            const selMod = document.getElementById('modelSelect').value;
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const matchesSearch = card.dataset.name.includes(term);
                const matchesCat = (selCat === 'todos' || card.dataset.cat === selCat);
                const matchesMod = (selMod === 'todos' || card.dataset.mod === selMod);

                if (matchesSearch && matchesCat && matchesMod) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            document.querySelectorAll('.category-section').forEach(section => {
                const visible = section.querySelectorAll('.product-card:not(.hidden)');
                section.style.display = visible.length > 0 ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
