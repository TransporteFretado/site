<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte Fretado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 380px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .swiper { width: 100%; height: 300px; background-color: #eee; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .content { padding: 20px; text-align: center; }
        h2 { margin: 0 0 10px; color: #333; }
        .price { font-size: 1.3rem; color: #27ae60; font-weight: bold; margin-bottom: 15px; }
        .btn-whatsapp { display: block; background-color: #25d366; color: white; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-whatsapp:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <div class="card">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="foto1.png" alt="Transporte Fretado">
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="content">
            <h2>Transporte Fretado</h2>
            <div class="price">Consulte Orçamento</div>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">
                Serviço especializado de transporte com conforto e segurança.
            </p>
            <a href="https://wa.me/5500000000000" class="btn-whatsapp">Entre em Contato</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', { loop: true, pagination: { el: '.swiper-pagination', clickable: true } });
    </script>
</body>
</html>
