<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Produto - Galeria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        
        .product-card {
            background: #fff;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Ajuste do tamanho das fotos */
        .swiper { width: 100%; height: 350px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .info { padding: 20px; text-align: center; }
        .price { font-size: 24px; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        
        .btn-whatsapp {
            display: block;
            background: #25d366;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="product-card">
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="foto1.jpg" alt="Foto 1"></div>
            <div class="swiper-slide"><img src="foto2.jpg" alt="Foto 2"></div>
            <div class="swiper-slide"><img src="foto3.jpg" alt="Foto 3"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="info">
        <h2>Nome do seu Produto</h2>
        <div class="price">R$ 150,00</div>
        <p>Descrição detalhada do que você está vendendo.</p>
        
        <a href="https://wa.me/SEUNUMERO" class="btn-whatsapp">Entre em Contato</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper', {
        pagination: { el: '.swiper-pagination', clickable: true },
        loop: true,
    });
</script>

</body>
</html>
